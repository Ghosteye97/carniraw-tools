<script>
(function(){

function determineBasePct(ageMonths, condition) {

  if (ageMonths <= 0) return 2.0;

  if (ageMonths < 4 && condition !== 'chunky' && condition !== 'rounded') return 8.0;
  if (ageMonths < 6 && condition !== 'chunky' && condition !== 'rounded') return 7.0;
  if (ageMonths < 12 && condition !== 'chunky' && condition !== 'rounded') return 6.0;

  switch (condition) {
    case 'under': return 3.0;
    case 'ideal': return 2.5;
    case 'rounded': return 2.25;
    case 'chunky': return 2.0;
    default: return 2.5;
  }
}

function activityMultiplier(level) {
  if (level === 'low') return 0.9;
  if (level === 'high') return 1.1;
  return 1.0;
}

function gramsFromPct(weightKg, pct) {
  return weightKg * 1000 * (pct / 100);
}

function roundTo(n, d){
  const m = Math.pow(10, d || 0);
  return Math.round(n * m) / m;
}

function suggestedMeals(ageMonths) {
  return ageMonths < 6 ? 3 : 2;
}

/* 🔥 MUCH MORE RELIABLE HEIGHT FUNCTION */
function sendHeight() {
  const height = Math.max(
    document.body.scrollHeight,
    document.documentElement.scrollHeight
  );

  window.parent.postMessage({
    type: "resize-iframe",
    height: height
  }, "*");
}

const weightEl = document.getElementById('weight');
const yearsEl = document.getElementById('ageYears');
const monthsEl = document.getElementById('ageMonths');
const condEl = document.getElementById('condition');
const activityEl = document.getElementById('activity');
const resultEl = document.getElementById('result');
const metricsBody = document.getElementById('metricsBody');
const summaryNote = document.getElementById('summaryNote');

document.getElementById("calcBtn").addEventListener("click", function(e){
  e.preventDefault();

  const w = Number(weightEl.value);
  const years = Number(yearsEl.value || 0);
  const months = Number(monthsEl.value || 0);
  const ageMonths = (years * 12) + months;

  if (isNaN(w) || w <= 0){
    alert("Enter a valid weight");
    return;
  }

  const basePct = determineBasePct(ageMonths, condEl.value);
  const mult = activityMultiplier(activityEl.value);

  const pctUsed = roundTo((basePct * mult) + 0.25, 2);

  const grams = gramsFromPct(w, pctUsed);
  const meals = suggestedMeals(ageMonths);
  const perMeal = grams / meals;

  metricsBody.innerHTML = `
    <tr><td>Weight</td><td>${w} kg</td></tr>
    <tr><td>Age</td><td>${years}y ${months}m</td></tr>
    <tr><td>Condition</td><td>${condEl.value}</td></tr>
    <tr><td>Activity</td><td>${activityEl.value}</td></tr>
    <tr><td>Percent Used</td><td>${pctUsed}%</td></tr>
    <tr><td>Daily Feed</td><td>${roundTo(grams,1)} g</td></tr>
    <tr><td>Meals</td><td>${meals}</td></tr>
    <tr><td>Per Meal</td><td>${roundTo(perMeal,1)} g</td></tr>
  `;

  resultEl.style.display = "block";
  resultEl.innerHTML = "<strong>Calculation complete</strong>";

  summaryNote.textContent = "Includes +0.25% adjustment and condition-aware feeding logic.";

  /* 🔥 MULTIPLE RESIZE TRIGGERS */
  sendHeight();
  setTimeout(sendHeight, 200);
  setTimeout(sendHeight, 600);
});

document.getElementById("resetBtn").addEventListener("click", function(e){
  e.preventDefault();

  weightEl.value = "";
  yearsEl.value = "0";
  monthsEl.value = "0";
  condEl.value = "ideal";
  activityEl.value = "moderate";

  metricsBody.innerHTML = "";
  resultEl.style.display = "none";
  summaryNote.textContent = "Results will appear after calculation.";

  sendHeight();
});

/* 🔥 LOAD + MULTIPLE FIRINGS */
window.addEventListener("load", () => {
  sendHeight();
  setTimeout(sendHeight, 300);
  setTimeout(sendHeight, 800);
});

/* 🔥 OBSERVER */
const observer = new MutationObserver(() => {
  sendHeight();
});
observer.observe(document.body, { childList: true, subtree: true });

/* 🔥 USER INTERACTION SAFETY */
document.addEventListener("click", () => {
  setTimeout(sendHeight, 200);
});

})();
</script>
