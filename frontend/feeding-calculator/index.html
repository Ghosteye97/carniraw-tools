<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carniraw Feeding Calculator</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

label {
  display: block;
  margin-top: 10px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

button {
  margin-top: 15px;
  padding: 10px;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  display: none;
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

td {
  padding: 6px;
  border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<h2>Raw Feeding Calculator</h2>

<label>Weight (kg)</label>
<input id="weight" type="number" step="0.1">

<label>Age (Years)</label>
<input id="ageYears" type="number" value="0">

<label>Age (Months)</label>
<input id="ageMonths" type="number" value="0">

<label>Body Condition</label>
<select id="condition">
  <option value="under">Underweight</option>
  <option value="ideal" selected>Ideal</option>
  <option value="rounded">Rounded</option>
  <option value="chunky">Chunky</option>
</select>

<label>Activity Level</label>
<select id="activity">
  <option value="low">Low</option>
  <option value="moderate" selected>Moderate</option>
  <option value="high">High</option>
</select>

<button id="calcBtn">Calculate</button>
<button id="resetBtn">Reset</button>

<div id="result">
  <strong>Calculation complete</strong>
  <table>
    <tbody id="metricsBody"></tbody>
  </table>
  <p id="summaryNote">Results will appear after calculation.</p>
</div>

<script>
(function(){

document.addEventListener("DOMContentLoaded", function(){

function determineBasePct(ageMonths, condition) {
  if (ageMonths <= 0) return 2.0;

  if (ageMonths < 4 && condition !== 'chunky' && condition !== 'rounded') return 8.0;
  if (ageMonths < 6 && condition !== 'chunky' && condition !== 'rounded') return 7.0;
  if (ageMonths < 12 && condition !== 'chunky' && condition !== 'rounded') return 6.0;

  switch (condition) {
    case 'under': return 3.0;
    case 'ideal': return 2.5;
    case 'rounded': return 2.25;
    case 'chunky': return 2.0;
    default: return 2.5;
  }
}

function activityMultiplier(level) {
  if (level === 'low') return 0.9;
  if (level === 'high') return 1.1;
  return 1.0;
}

function gramsFromPct(weightKg, pct) {
  return weightKg * 1000 * (pct / 100);
}

function roundTo(n, d){
  const m = Math.pow(10, d || 0);
  return Math.round(n * m) / m;
}

function suggestedMeals(ageMonths) {
  return ageMonths < 6 ? 3 : 2;
}

/* HEIGHT HANDLER */
function sendHeight() {
  const height = Math.max(
    document.body.scrollHeight,
    document.documentElement.scrollHeight
  );

  window.parent.postMessage({
    type: "resize-iframe",
    height: height
  }, "*");
}

/* ELEMENTS */
const weightEl = document.getElementById('weight');
const yearsEl = document.getElementById('ageYears');
const monthsEl = document.getElementById('ageMonths');
const condEl = document.getElementById('condition');
const activityEl = document.getElementById('activity');
const resultEl = document.getElementById('result');
const metricsBody = document.getElementById('metricsBody');
const summaryNote = document.getElementById('summaryNote');
const calcBtn = document.getElementById("calcBtn");
const resetBtn = document.getElementById("resetBtn");

/* CALCULATE */
calcBtn.addEventListener("click", function(e){
  e.preventDefault();

  const w = Number(weightEl.value);
  const years = Number(yearsEl.value || 0);
  const months = Number(monthsEl.value || 0);
  const ageMonths = (years * 12) + months;

  if (isNaN(w) || w <= 0){
    alert("Enter a valid weight");
    return;
  }

  const basePct = determineBasePct(ageMonths, condEl.value);
  const mult = activityMultiplier(activityEl.value);

  const pctUsed = roundTo((basePct * mult) + 0.25, 2);

  const grams = gramsFromPct(w, pctUsed);
  const meals = suggestedMeals(ageMonths);
  const perMeal = grams / meals;

  metricsBody.innerHTML = `
    <tr><td>Weight</td><td>${w} kg</td></tr>
    <tr><td>Age</td><td>${years}y ${months}m</td></tr>
    <tr><td>Condition</td><td>${condEl.value}</td></tr>
    <tr><td>Activity</td><td>${activityEl.value}</td></tr>
    <tr><td>Percent Used</td><td>${pctUsed}%</td></tr>
    <tr><td>Daily Feed</td><td>${roundTo(grams,1)} g</td></tr>
    <tr><td>Meals</td><td>${meals}</td></tr>
    <tr><td>Per Meal</td><td>${roundTo(perMeal,1)} g</td></tr>
  `;

  resultEl.style.display = "block";
  summaryNote.textContent = "Includes +0.25% adjustment as per Carniraw feeding guideline.";

  sendHeight();
});

/* RESET */
resetBtn.addEventListener("click", function(e){
  e.preventDefault();

  weightEl.value = "";
  yearsEl.value = "0";
  monthsEl.value = "0";
  condEl.value = "ideal";
  activityEl.value = "moderate";

  metricsBody.innerHTML = "";
  resultEl.style.display = "none";
  summaryNote.textContent = "Results will appear after calculation.";

  sendHeight();
});

/* AUTO RESIZE */
window.addEventListener("load", sendHeight);

});
})();
</script>

</body>
</html>
