<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Carniraw Feeding Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --brand:#289dcc;
  --muted:#666;
  --card:#fffaf7;
  --accent:#3d4045;
}

body{
  font-family:'Quicksand',sans-serif;
  margin:0;
  background:#fff;
}

.wrap{
  max-width:720px;
  margin:50px auto;
  padding:24px;
  background:var(--card);
  border-radius:12px;
  box-shadow:0 8px 26px rgba(0,0,0,0.06);
}

h1{
  font-family:'Poiret One',cursive;
  margin-bottom:8px;
}

label{
  display:block;
  margin-top:12px;
  font-weight:600;
}

input, select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #e8e8e8;
  margin-top:6px;
}

button{
  margin-top:16px;
  background:var(--brand);
  color:#fff;
  padding:10px 14px;
  border:0;
  border-radius:8px;
  cursor:pointer;
  font-weight:700;
}

button.secondary{
  background:#ccc;
  color:#000;
  margin-left:8px;
}

#result{
  margin-top:20px;
  display:none;
}

table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

td{
  padding:6px;
  border-bottom:1px solid #eee;
}

#summaryNote{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Raw Feeding Calculator</h1>

  <label>Weight (kg)</label>
  <input id="weight" type="number" step="0.1">

  <label>Age (Years)</label>
  <input id="ageYears" type="number" value="0">

  <label>Age (Months)</label>
  <input id="ageMonths" type="number" value="0">

  <label>Body Condition</label>
  <select id="condition">
    <option value="under">Underweight</option>
    <option value="ideal" selected>Ideal</option>
    <option value="rounded">Rounded</option>
    <option value="chunky">Chunky</option>
  </select>

  <label>Activity Level</label>
  <select id="activity">
    <option value="low">Low</option>
    <option value="moderate" selected>Moderate</option>
    <option value="high">High</option>
  </select>

  <button id="calcBtn">Calculate</button>
  <button id="resetBtn" class="secondary">Reset</button>

  <div id="result">
    <strong>Calculation complete</strong>
    <table>
      <tbody id="metricsBody"></tbody>
    </table>
    <p id="summaryNote">Results will appear after calculation.</p>
  </div>
</div>

<script>
(function(){
document.addEventListener("DOMContentLoaded", function(){

function determineBasePct(ageMonths, condition) {
  if (ageMonths <= 0) return 2.0;
  if (ageMonths < 4 && condition !== 'chunky' && condition !== 'rounded') return 8.0;
  if (ageMonths < 6 && condition !== 'chunky' && condition !== 'rounded') return 7.0;
  if (ageMonths < 12 && condition !== 'chunky' && condition !== 'rounded') return 6.0;

  switch (condition) {
    case 'under': return 3.0;
    case 'ideal': return 2.5;
    case 'rounded': return 2.25;
    case 'chunky': return 2.0;
    default: return 2.5;
  }
}

function activityMultiplier(level) {
  if (level === 'low') return 0.9;
  if (level === 'high') return 1.1;
  return 1.0;
}

function gramsFromPct(weightKg, pct) {
  return weightKg * 1000 * (pct / 100);
}

function roundTo(n, d){
  const m = Math.pow(10, d || 0);
  return Math.round(n * m) / m;
}

function suggestedMeals(ageMonths) {
  return ageMonths < 6 ? 3 : 2;
}

const calcBtn = document.getElementById("calcBtn");
const resetBtn = document.getElementById("resetBtn");

calcBtn.addEventListener("click", function(e){
  e.preventDefault();

  const w = Number(document.getElementById('weight').value);
  const years = Number(document.getElementById('ageYears').value || 0);
  const months = Number(document.getElementById('ageMonths').value || 0);
  const ageMonths = (years * 12) + months;

  if (isNaN(w) || w <= 0){
    alert("Enter a valid weight");
    return;
  }

  const basePct = determineBasePct(ageMonths, document.getElementById('condition').value);
  const mult = activityMultiplier(document.getElementById('activity').value);

  const pctUsed = roundTo((basePct * mult) + 0.25, 2);

  const grams = gramsFromPct(w, pctUsed);
  const meals = suggestedMeals(ageMonths);
  const perMeal = grams / meals;

  document.getElementById('metricsBody').innerHTML = `
    <tr><td>Weight</td><td>${w} kg</td></tr>
    <tr><td>Age</td><td>${years}y ${months}m</td></tr>
    <tr><td>Percent Used</td><td>${pctUsed}%</td></tr>
    <tr><td>Daily Feed</td><td>${roundTo(grams,1)} g</td></tr>
    <tr><td>Meals</td><td>${meals}</td></tr>
    <tr><td>Per Meal</td><td>${roundTo(perMeal,1)} g</td></tr>
  `;

  document.getElementById("result").style.display = "block";
  document.getElementById("summaryNote").textContent =;
});

resetBtn.addEventListener("click", function(e){
  e.preventDefault();
  document.getElementById('weight').value = "";
  document.getElementById('metricsBody').innerHTML = "";
  document.getElementById("result").style.display = "none";
});

});
})();
</script>

</body>
</html>
